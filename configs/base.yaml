project:
  name: dico_rank_experiments
  output_dir: outputs

seed: 42
experiment_name: base
method: lora
rank: 4

model:
  name_or_path: /ai/lxw/lxw/Qwen3-8B
  torch_dtype: bfloat16
  device_map: auto
  load_in_8bit: false
  load_in_4bit: false
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

data:
  dataset_name: openai/gsm8k
  dataset_config: main
  train_path: data/gsm8k/main/train.jsonl
  eval_path: data/gsm8k/main/test.jsonl
  max_length: 512
  train_limit: null
  eval_limit: null
  num_workers: 4

training:
  max_steps: 1000
  batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-4
  weight_decay: 0.0
  warmup_ratio: 0.03
  logging_steps: 10
  eval_steps: 0
  save_steps: 1000
  gradient_checkpointing: true
  save_optimizer_state: false

lora:
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  max_rank_multiplier: 2

budget:
  mode: equal_trainable_params
  warning_threshold: 0.01
  enforce_target_ratio: 1.0
  enforce_min_ratio: 0.97

calibration:
  enabled: true
  num_samples: 128
  batch_size: 4
  seed: 42
  shuffle: false
  save_dir: outputs/preallocations

preallocation:
  atom_mode: svd
  fallback_atom_mode: module_proxy
  allocation_method: directional_budgeted
  aggregation_mode: weighted_log
  weighted_topk_k: auto
  top_k_atoms: 8
  sketch_dim: 32
  sketch_oversample: 24
  compute_device: auto
  module_chunk_size: 32
  progress_logging_steps: 1
  sketch_seed: 42
  sketch_dtype: float32
  answer_only: true
  profile_norm_mode: streaming_estimate
  beta: 1.0
  gamma: 1.0
  delta: 1.0
  epsilon_cov: 0.05
  use_soft_tail: true
  eta: 0.98
  allow_rank_beyond_selected_evidence: true
  evidence_selection:
    max_selected_atoms: auto
    sparse_stop_by_coverage: true
    coverage_stop_threshold: 0.05
  atom_weight_normalization: none
  use_cost_aware_allocation: true
  atom_utility_floor: 0.0
  score_type: coverage
  coverage_lambda: 0.5
  r_min_multiplier: 0.25
  r_max_multiplier: 2
  save_atom_logs: true

dynamic:
  enabled: false
  update_ratios: [0.2, 0.4, 0.6]
  freeze_after_ratio: 0.6
  move_ratio: 0.2
  score_ema_decay: 0.9
  grad_weight: 0.5
  update_weight: 0.5
  score_smoothing: 1.0e-6
  allocation_temperature: 1.0
  r_min_multiplier: 0.25
  r_max_multiplier: 2

evaluation:
  metric: gsm8k_accuracy
  protocol: internal_zero_shot
  prompt_style: sft_cot_hash
  answer_extraction: strict_then_flexible
  max_batches: 4
  mid_eval_loss_only:
    enabled: true
    every_n_steps: 50
    max_batches: 4
  compute_accuracy: true
  accuracy_during_training: false
  accuracy_max_samples: null
  generation_max_new_tokens: 256
  stop_sequences:
    - "\nQuestion:"
    - "<|im_end|>"
