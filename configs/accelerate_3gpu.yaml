# Accelerate DDP configuration for 3x A800 training.
# Usage: accelerate launch --config_file configs/accelerate_3gpu.yaml scripts/run_experiment.py --config ...
compute_environment: LOCAL_MACHINE
distributed_type: MULTI_GPU
num_processes: 3
mixed_precision: 'no'       # model loaded in bfloat16 via device_map; no additional cast needed
main_process_port: 29500
same_network: true
machine_rank: 0
num_machines: 1
rdzv_backend: static
