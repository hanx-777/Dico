inherits: ../base.yaml

experiment_name: dico_predynamic_r4
method: dico_predynamic
rank: 4

rank_strategy:
  init: dico_pre
  dynamic: true

preallocation:
  aggregation_mode: weighted_log
  atom_weight_normalization: none
  use_cost_aware_allocation: true

dynamic:
  enabled: true
  update_ratios: [0.2, 0.4, 0.6]
  freeze_after_ratio: 0.6
  move_ratio: 0.10
  score_smoothing: 1.0e-6
  allocation_temperature: 1.0
